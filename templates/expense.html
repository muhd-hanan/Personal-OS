        }

        async function handleEntrySubmit(e) {
            e.preventDefault();

            const date = document.getElementById('entry-date').value;
            const description = document.getElementById('entry-description').value.trim();
            const amount = parseFloat(document.getElementById('entry-amount').value);
            const remarks = document.getElementById('entry-remarks').value.trim();
            const type = window.selectedEntryType || 'expense';

            if (!date || !description || isNaN(amount) || amount <= 0) {
                showToast('Please fill in date, description and a valid amount.');
                return;
            }

            const isEdit = !!editingEntryId;
            const entryId = editingEntryId || ('entry_' + Date.now());

            const entryData = {
                id: isEdit ? editingEntryId : null,
                date: date,
                type: type,
                description: description,
                amount: amount,
                remarks: remarks,
                tracker_id: currentTrackerId
            };

            // Show loading state on button
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn ? submitBtn.textContent : '';
            if (submitBtn) { submitBtn.textContent = 'Saving...'; submitBtn.disabled = true; }

            try {
                const response = await fetch('/api/entry/save/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': CSRF_TOKEN
                    },
                    body: JSON.stringify(entryData)
                });

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`Server error ${response.status}: ${text.substring(0, 200)}`);
                }

                const result = await response.json();
                if (result.status === 'success') {
                    // Update in-memory data immediately so table shows new entry right away
                    const savedId = result.entry_id || entryId;
                    const newEntry = { id: savedId, date, type, description, amount, remarks };
                    const tracker = trackers[currentTrackerId];
                    if (!tracker.entries) tracker.entries = [];

                    if (isEdit) {
                        // Replace existing entry
                        const idx = tracker.entries.findIndex(x => x.id === editingEntryId);
                        if (idx >= 0) tracker.entries[idx] = newEntry;
                        else tracker.entries.push(newEntry);
                    } else {
                        tracker.entries.push(newEntry);
                    }

                    hideEntryModal();
                    renderAll();
                    showToast(isEdit ? 'Entry updated!' : 'Entry saved!', 'success');
                } else {
                    if (submitBtn) { submitBtn.textContent = originalText; submitBtn.disabled = false; }
                    showToast('Save failed: ' + result.message);
                }
            } catch (err) {
                console.error('Save entry error:', err);
                if (submitBtn) { submitBtn.textContent = originalText; submitBtn.disabled = false; }
                showToast('Failed to save entry: ' + err.message);
            }
        }

        function editEntry(id) {
            const entries = trackers[currentTrackerId].entries;
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            editingEntryId = id;
            document.getElementById('modal-title').textContent = 'Edit Entry';

            document.getElementById('entry-id').value = entry.id;
            document.getElementById('entry-date').value = entry.date;
            document.getElementById('entry-description').value = entry.description;
            document.getElementById('entry-amount').value = entry.amount;
            document.getElementById('entry-remarks').value = entry.remarks || '';

            setEntryType(entry.type);

            document.getElementById('entry-modal').classList.remove('hidden');
        }

        function promptDeleteEntry(id) {
            entryToDelete = id;
            document.getElementById('delete-confirm-modal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            document.getElementById('delete-confirm-modal').classList.add('hidden');
        }

        async function confirmDelete() {
            if (!entryToDelete) return;

            const deleteBtn = document.querySelector('#delete-confirm-modal button.bg-red-600');
            if (deleteBtn) { deleteBtn.textContent = 'Deleting...'; deleteBtn.disabled = true; }

            try {
                const response = await fetch('/api/entry/delete/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': CSRF_TOKEN
                    },
                    body: JSON.stringify({ entry_id: entryToDelete })
                });

                if (!response.ok) {
                    throw new Error(`Server error ${response.status}`);
                }

                const result = await response.json();
                if (result.status === 'success') {
                    // Remove from in-memory data immediately
                    const tracker = trackers[currentTrackerId];
                    if (tracker && tracker.entries) {
                        tracker.entries = tracker.entries.filter(e => e.id !== entryToDelete);
                    }
                    hideDeleteModal();
                    entryToDelete = null;
                    renderAll();
                    showToast('Entry deleted.', 'success');
                } else {
                    if (deleteBtn) { deleteBtn.textContent = 'Yes, Delete'; deleteBtn.disabled = false; }
                    showToast('Delete failed: ' + result.message);
                }
            } catch (err) {
                console.error('Delete error:', err);
                if (deleteBtn) { deleteBtn.textContent = 'Yes, Delete'; deleteBtn.disabled = false; }
                showToast('Failed to delete: ' + err.message);
            }
        }



        // Export CSV
        function exportCSV() {
            const entries = getFilteredEntries();
            const tracker = trackers[currentTrackerId];
            const label = getFilterLabel();

            if (entries.length === 0) {
                alert("No entries to export for the current filter.");
                return;
            }

            // Calculate summary from filtered entries
            let totalIncome = 0, totalExpense = 0;
            entries.forEach(e => {
                const amt = parseFloat(e.amount);
                if (e.type === 'income') totalIncome += amt;
                else totalExpense += amt;
            });
            const balance = totalIncome - totalExpense;

            // Format date nicely: DD MMM YYYY timezone-safely
            function fmtDate(dateStr) {
                const [year, month, day] = dateStr.split('-').map(Number);
                const d = new Date(year, month - 1, day);
                return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            }

            const exportedOn = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            // Build CSV
            let csvContent = '';

            // Summary header block
            csvContent += `"ExpenseFlow - Export Report"\n`;
            csvContent += `"Tracker","${tracker.name}"\n`;
            csvContent += `"Filter","${label}"\n`;
            csvContent += `"Exported On","${exportedOn}"\n`;
            csvContent += `"Total Entries","${entries.length}"\n`;
            csvContent += `\n`;
            csvContent += `"--- Summary ---"\n`;
            csvContent += `"Income","₹${totalIncome.toLocaleString('en-IN')}"\n`;
            csvContent += `"Expense","₹${totalExpense.toLocaleString('en-IN')}"\n`;
            csvContent += `"Balance","₹${balance.toLocaleString('en-IN')}"\n`;
            csvContent += `\n`;

            // Data table header
            csvContent += `"Date","Type","Description","Amount (₹)","Remarks"\n`;

            // Rows
            entries.forEach(entry => {
                const safeDesc = entry.description.replace(/"/g, '""');
                const safeRemarks = (entry.remarks || '').replace(/"/g, '""');
                const formattedDate = fmtDate(entry.date);
                const type = entry.type.charAt(0).toUpperCase() + entry.type.slice(1);
                csvContent += `"${formattedDate}","${type}","${safeDesc}","${parseFloat(entry.amount).toFixed(2)}","${safeRemarks}"\n`;
            });

            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);

            const trackerSlug = tracker.name.toLowerCase().replace(/\s+/g, '_');
            const filterSlug = label.toLowerCase().replace(/[\s→\-]/g, '_').replace(/[^a-z0-9_]/g, '');
            const today = new Date().toISOString().split('T')[0];
            link.setAttribute("download", `${trackerSlug}_${filterSlug}_${today}.csv`);

            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Theme
        let isDarkMode = true;

        function applyTheme(dark) {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const label = document.querySelector('#theme-label');

            if (dark) {
                body.classList.remove('light-mode');
                if (icon) { icon.className = 'fa-solid fa-moon text-amber-400'; }
                if (label) label.textContent = 'Dark Mode';
            } else {
                body.classList.add('light-mode');
                if (icon) { icon.className = 'fa-solid fa-sun text-amber-400'; }
                if (label) label.textContent = 'Light Mode';
            }

            // Update chart styling dynamically if instance exists
            if (expenseChartInstance) {
                const gridColor = dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
                const textColor = dark ? '#6b7280' : '#94a3b8';

                expenseChartInstance.options.scales.x.grid.color = gridColor;
                expenseChartInstance.options.scales.x.ticks.color = textColor;
                expenseChartInstance.options.scales.y.grid.color = gridColor;
                expenseChartInstance.options.scales.y.ticks.color = textColor;

                if (expenseChartInstance.options.plugins.tooltip) {
                    expenseChartInstance.options.plugins.tooltip.backgroundColor = dark ? 'rgba(15,23,42,0.9)' : 'rgba(255,255,255,0.95)';
                    expenseChartInstance.options.plugins.tooltip.titleColor = dark ? '#f3f4f6' : '#0f172a';
                    expenseChartInstance.options.plugins.tooltip.bodyColor = dark ? '#9ca3af' : '#475569';
                    expenseChartInstance.options.plugins.tooltip.borderColor = dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
                }
                expenseChartInstance.update();
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            applyTheme(isDarkMode);
            localStorage.setItem('expenseFlowTheme', isDarkMode ? 'dark' : 'light');
        }

        function loadTheme() {
            const saved = localStorage.getItem('expenseFlowTheme');
            isDarkMode = saved !== 'light';
            applyTheme(isDarkMode);
        }

        function renderAll() {
            const isAll = currentTrackerId === 'all';
            document.getElementById('current-tracker-name').textContent = isAll ? 'All Trackers' : trackers[currentTrackerId].name;

            // Adjust New Entry / Delete buttons for 'all' mode
            const newEntryBtn = document.querySelector('header button[onclick="showNewEntryModal()"]');
            const deleteTrackerBtn = document.querySelector('button[onclick="deleteCurrentTracker()"]');

            if (isAll) {
                if (newEntryBtn) {
                    newEntryBtn.classList.add('opacity-50', 'pointer-events-none');
                    newEntryBtn.title = "Select a specific tracker to add entries";
                }
                if (deleteTrackerBtn) {
                    deleteTrackerBtn.classList.add('opacity-50', 'pointer-events-none');
                }
            } else {
                if (newEntryBtn) {
                    newEntryBtn.classList.remove('opacity-50', 'pointer-events-none');
                    newEntryBtn.title = "";
                }
                if (deleteTrackerBtn) {
                    deleteTrackerBtn.classList.remove('opacity-50', 'pointer-events-none');
                }
            }

            renderTrackers();
            renderCards();
            renderEntries();
            renderFilterButtons();
            renderCategoryFilterPills();
            updateExpenseChart();
        }

        function changeGraphStyle(style) {
            currentGraphStyle = style;
            updateChartStyle();
        }

        function updateChartStyle() {
            if (!expenseChartInstance) return;

            const datasets = expenseChartInstance.data.datasets;
            if (currentGraphStyle === 'bar') {
                // Income
                datasets[0].type = 'bar';
                datasets[0].backgroundColor = 'rgba(59,130,246,0.25)';
                datasets[0].borderColor = '#3b82f6';
                datasets[0].borderWidth = 1.5;
                datasets[0].borderRadius = 6;
                datasets[0].pointRadius = 0;
                datasets[0].fill = false;

                // Expense
                datasets[1].type = 'bar';
                datasets[1].backgroundColor = 'rgba(248,113,113,0.25)';
                datasets[1].borderColor = '#f87171';
                datasets[1].borderWidth = 1.5;
                datasets[1].borderRadius = 6;
                datasets[1].pointRadius = 0;
                datasets[1].fill = false;
            } else if (currentGraphStyle === 'line') {
                // Income
                datasets[0].type = 'line';
                datasets[0].borderColor = '#3b82f6';
                datasets[0].backgroundColor = 'rgba(59,130,246,0.12)';
                datasets[0].borderWidth = 2;
                datasets[0].pointRadius = 3;
                datasets[0].pointBackgroundColor = '#3b82f6';
                datasets[0].tension = 0.4;
                datasets[0].fill = true;

                // Expense
                datasets[1].type = 'line';
                datasets[1].borderColor = '#f87171';
                datasets[1].backgroundColor = 'rgba(248,113,113,0.12)';
                datasets[1].borderWidth = 2;
                datasets[1].pointRadius = 3;
                datasets[1].pointBackgroundColor = '#f87171';
                datasets[1].tension = 0.4;
                datasets[1].fill = true;
            } else {
                // Mixed: Income as Bar, Expense as Line
                // Income
                datasets[0].type = 'bar';
                datasets[0].backgroundColor = 'rgba(59,130,246,0.25)';
                datasets[0].borderColor = '#3b82f6';
                datasets[0].borderWidth = 1.5;
                datasets[0].borderRadius = 6;
                datasets[0].pointRadius = 0;
                datasets[0].fill = false;

                // Expense
                datasets[1].type = 'line';
                datasets[1].borderColor = '#f87171';
                datasets[1].backgroundColor = 'rgba(248,113,113,0.12)';
                datasets[1].borderWidth = 2;
                datasets[1].pointRadius = 3;
                datasets[1].pointBackgroundColor = '#f87171';
                datasets[1].tension = 0.4;
                datasets[1].fill = true;
            }
            expenseChartInstance.update();
        }

        function getEntryMonthKey(dateStr) {
            const parts = dateStr.split('-');
            if (parts.length < 2) return '';
            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1; // 0-based index for Date
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${monthNames[month]} ${year}`;
        }

        function updateExpenseChart() {
            // Get entries for the active tracker or all trackers
            let entries = [];
            if (currentTrackerId === 'all') {
                Object.keys(trackers).forEach(key => {
                    entries = entries.concat(trackers[key].entries || []);
                });
            } else if (trackers[currentTrackerId]) {
                entries = trackers[currentTrackerId].entries || [];
            }

            const chartData = getChartDataForRange(currentGraphRange, entries);

            // Draw or update chart
            const canvas = document.getElementById('expense-chart');
            if (!canvas) return;

            if (!expenseChartInstance) {
                if (typeof Chart === 'undefined') return;
                const isDark = !document.body.classList.contains('light-mode');
                const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
                const textColor = isDark ? '#6b7280' : '#94a3b8';

                expenseChartInstance = new Chart(canvas, {
                    type: 'bar',
                    data: {
                        labels: chartData.labels,
                        datasets: [
                            {
                                label: 'Income',
                                data: chartData.incomes,
                                backgroundColor: 'rgba(59,130,246,0.25)',
                                borderColor: '#3b82f6',
                                borderWidth: 1.5,
                                borderRadius: 6,
                                order: 2
                            },
                            {
                                label: 'Expense',
                                data: chartData.expenses,
                                type: 'line',
                                borderColor: '#f87171',
                                backgroundColor: 'rgba(248,113,113,0.12)',
                                borderWidth: 2,
                                pointRadius: 3,
                                pointBackgroundColor: '#f87171',
                                tension: 0.4,
                                fill: true,
                                order: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: isDark ? 'rgba(15,23,42,0.9)' : 'rgba(255,255,255,0.95)',
                                titleColor: isDark ? '#f3f4f6' : '#0f172a',
                                bodyColor: isDark ? '#9ca3af' : '#475569',
                                borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)',
                                borderWidth: 1,
                                padding: 10,
                                callbacks: {
                                    label: ctx => ` ₹${ctx.parsed.y.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`
                                }
                            }
                        },
                        scales: {
                            x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
                            y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 }, callback: v => '₹' + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v) } }
                        }
                    }
                });
                updateChartStyle();
            } else {
                expenseChartInstance.data.labels = chartData.labels;
                expenseChartInstance.data.datasets[0].data = chartData.incomes;
                expenseChartInstance.data.datasets[1].data = chartData.expenses;
                updateChartStyle();
            }
        }

        function renderCategoryFilterPills() {
            const container = document.getElementById('category-filter-pills');
            if (!container) return;
            container.innerHTML = '';

            // Add "All" option
            const allBtn = document.createElement('button');
            allBtn.setAttribute('data-tracker-id', 'all');
            allBtn.textContent = 'All';
            allBtn.onclick = () => switchTracker('all');
            container.appendChild(allBtn);

            // Add dynamic trackers
            Object.keys(trackers).forEach(key => {
                const btn = document.createElement('button');
                btn.setAttribute('data-tracker-id', key);
                btn.textContent = trackers[key].name;
                btn.onclick = () => switchTracker(key);
                container.appendChild(btn);
            });

            // Set active states
            const buttons = container.querySelectorAll('button');
            buttons.forEach(btn => {
                const btnId = btn.getAttribute('data-tracker-id');
                if (btnId === currentTrackerId) {
                    btn.className = "px-3 py-1.5 text-xs rounded-lg font-medium transition-all duration-200 bg-blue-600 text-white border border-blue-500/20 shadow-sm shadow-blue-500/20";
                } else {
                    btn.className = "px-3 py-1.5 text-xs rounded-lg font-medium transition-all duration-200 bg-transparent hover:bg-slate-800/40 text-gray-400 hover:text-white";
                }
            });
        }

        // Initialize everything
        async function initializeApp() {
            loadTheme();
            loadData();
            renderAll();

            // One-time migration of old localStorage data to DB
            await migrateLocalStorageToDb();

            // Keyboard shortcuts
            document.addEventListener('keydown', function (e) {
                if (e.key === "Escape") {
                    const modals = document.querySelectorAll('.fixed');
                    for (let modal of modals) {
                        if (!modal.classList.contains('hidden')) {
                            modal.classList.add('hidden');
                        }
                    }
                }

                if (e.key === "n" && e.ctrlKey) {
                    e.preventDefault();
                    showNewEntryModal();
                }
            });

            // Close modals when clicking backdrop
            const modals = document.querySelectorAll('.fixed');
            modals.forEach(modal => {
                modal.addEventListener('click', function (e) {
                    if (e.target === modal) {
                        modal.classList.add('hidden');
                    }
                });
            });
        }

        // Make functions global
        window.showNewEntryModal = showNewEntryModal;
        window.hideEntryModal = hideEntryModal;
        window.setEntryType = setEntryType;
        window.handleEntrySubmit = handleEntrySubmit;
        window.editEntry = editEntry;
        window.promptDeleteEntry = promptDeleteEntry;
        window.hideDeleteModal = hideDeleteModal;
        window.confirmDelete = confirmDelete;
        window.switchTracker = switchTracker;
        window.showNewTrackerModal = showNewTrackerModal;
        window.hideNewTrackerModal = hideNewTrackerModal;
        window.createNewTracker = createNewTracker;
        window.deleteCurrentTracker = deleteCurrentTracker;

        window.setFilter = setFilter;
        window.resetFilter = resetFilter;
        window.filterEntries = filterEntries;
        window.toggleCustomRangePanel = toggleCustomRangePanel;
        window.applyCustomRange = applyCustomRange;
        window.clearCustomRange = clearCustomRange;
        window.exportCSV = exportCSV;
        function changeGraphRange(range) {
            currentGraphRange = range;
            updateExpenseChart();
        }

        window.toggleTheme = toggleTheme;
        window.changeGraphStyle = changeGraphStyle;
        window.changeGraphRange = changeGraphRange;

        // Toggles mobile side drawer
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar && overlay) {
                const isHidden = sidebar.classList.contains('-translate-x-full');
                if (isHidden) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        }
        window.toggleSidebar = toggleSidebar;

        // Bridges mobile search input to desktop search handler
        function filterEntriesMobile() {
            const mobileInput = document.getElementById('search-input-mobile');
            const desktopInput = document.getElementById('search-input');
            if (mobileInput && desktopInput) {
                desktopInput.value = mobileInput.value;
                filterEntries();
            }
        }
        window.filterEntriesMobile = filterEntriesMobile;

        // Boot the app
        window.onload = initializeApp;
    </script>
</body>

</html>
