<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Personal OS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --glass-blur: 20px;
            --glass-saturate: 180%;
        }

        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }

        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Animated background glowing blobs */
        .glass-bg-blobs {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            mix-blend-mode: plus-lighter;
            animation: float 25s infinite alternate ease-in-out;
            transition: all 0.8s ease-in-out;
        }

        /* Dark mode blobs: vibrant cyan, violet, indigo */
        body:not(.light-mode) .blob-1 {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4) 0%, rgba(99, 102, 241, 0) 70%);
            width: 600px;
            height: 600px;
            top: -10%;
            left: 10%;
            animation-duration: 20s;
        }

        body:not(.light-mode) .blob-2 {
            background: radial-gradient(circle, rgba(168, 85, 247, 0.35) 0%, rgba(168, 85, 247, 0) 70%);
            width: 700px;
            height: 700px;
            bottom: -10%;
            right: 15%;
            animation-duration: 28s;
            animation-delay: -5s;
        }

        body:not(.light-mode) .blob-3 {
            background: radial-gradient(circle, rgba(14, 165, 233, 0.3) 0%, rgba(14, 165, 233, 0) 70%);
            width: 550px;
            height: 550px;
            top: 40%;
            left: 50%;
            animation-duration: 24s;
            animation-delay: -10s;
        }

        /* Light mode blobs: soft pastel blue, pink, peach */
        body.light-mode .blob-1 {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.18) 0%, rgba(59, 130, 246, 0) 70%);
            width: 700px;
            height: 700px;
            top: -5%;
            left: 5%;
            animation-duration: 22s;
        }

        body.light-mode .blob-2 {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, rgba(236, 72, 153, 0) 70%);
            width: 800px;
            height: 800px;
            bottom: -5%;
            right: 10%;
            animation-duration: 32s;
            animation-delay: -4s;
        }

        body.light-mode .blob-3 {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, rgba(245, 158, 11, 0) 70%);
            width: 600px;
            height: 600px;
            top: 35%;
            left: 45%;
            animation-duration: 26s;
            animation-delay: -8s;
        }

        @keyframes float {
            0% {
                transform: translate(0px, 0px) scale(1) rotate(0deg);
            }

            33% {
                transform: translate(40px, -60px) scale(1.1) rotate(120deg);
            }

            66% {
                transform: translate(-30px, 40px) scale(0.95) rotate(240deg);
            }

            100% {
                transform: translate(0px, 0px) scale(1) rotate(360deg);
            }
        }

        /* ── DARK THEME GLASS ── */
        body:not(.light-mode) {
            background: radial-gradient(circle at 50% 50%, #080b16 0%, #02040a 100%) !important;
            color: #f3f4f6 !important;
        }

        body:not(.light-mode) .bg-slate-950 {
            background-color: transparent !important;
        }

        body:not(.light-mode) .bg-slate-900 {
            background: rgba(10, 15, 30, 0.55) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border-color: rgba(255, 255, 255, 0.08) !important;
        }

        body:not(.light-mode) header.bg-slate-900 {
            background: rgba(10, 15, 30, 0.3) !important;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-color: rgba(255, 255, 255, 0.08) !important;
        }

        body:not(.light-mode) .bg-slate-900:not(.w-72):not(header) {
            background: rgba(15, 23, 42, 0.4) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid rgba(255, 255, 255, 0.09) !important;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        body:not(.light-mode) .bg-slate-800 {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: #f3f4f6 !important;
        }

        body:not(.light-mode) .bg-slate-800:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: rgba(255, 255, 255, 0.15) !important;
        }

        body:not(.light-mode) .border-slate-800 {
            border-color: rgba(255, 255, 255, 0.08) !important;
        }

        body:not(.light-mode) .border-slate-700 {
            border-color: rgba(255, 255, 255, 0.12) !important;
        }

        body:not(.light-mode) input,
        body:not(.light-mode) textarea {
            background: rgba(10, 15, 30, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: #ffffff !important;
            backdrop-filter: blur(10px);
        }

        body:not(.light-mode) input:focus,
        body:not(.light-mode) textarea:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.25) !important;
        }

        /* ── LIGHT THEME GLASS ── */
        body.light-mode {
            background: radial-gradient(circle at 50% 50%, #f3f4f6 0%, #e2e8f0 100%) !important;
            color: #0f172a !important;
        }

        body.light-mode .bg-slate-950 {
            background-color: transparent !important;
        }

        body.light-mode [class*="bg-slate-950/"] {
            background-color: rgba(0, 0, 0, 0.02) !important;
        }

        body.light-mode .bg-slate-900,
        body.light-mode [class*="bg-slate-900/"] {
            background: rgba(255, 255, 255, 0.5) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border-color: rgba(0, 0, 0, 0.06) !important;
            color: #0f172a !important;
        }

        body.light-mode header.bg-slate-900,
        body.light-mode header[class*="bg-slate-900/"] {
            background: rgba(255, 255, 255, 0.3) !important;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-color: rgba(0, 0, 0, 0.06) !important;
        }

        body.light-mode .bg-slate-900:not(.w-72):not(header),
        body.light-mode [class*="bg-slate-900/"]:not(.w-72):not(header) {
            background: rgba(255, 255, 255, 0.45) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid rgba(255, 255, 255, 0.7) !important;
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.06), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        body.light-mode .bg-slate-800,
        body.light-mode [class*="bg-slate-800/"] {
            background: rgba(0, 0, 0, 0.04) !important;
            border: 1px solid rgba(0, 0, 0, 0.06) !important;
            color: #0f172a !important;
        }

        body.light-mode .bg-slate-800:hover,
        body.light-mode [class*="bg-slate-800/"]:hover {
            background: rgba(0, 0, 0, 0.08) !important;
            border-color: rgba(0, 0, 0, 0.12) !important;
        }

        body.light-mode .border-slate-800,
        body.light-mode [class*="border-slate-800"] {
            border-color: rgba(0, 0, 0, 0.06) !important;
        }

        body.light-mode .border-slate-700,
        body.light-mode [class*="border-slate-700"] {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }

        body.light-mode input,
        body.light-mode textarea,
        body.light-mode select {
            background: rgba(255, 255, 255, 0.55) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            color: #0f172a !important;
            backdrop-filter: blur(10px);
        }

        body.light-mode input:focus,
        body.light-mode textarea:focus,
        body.light-mode select:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.18) !important;
        }

        /* Text colors overrides */
        body.light-mode .text-white {
            color: #0f172a !important;
        }

        body.light-mode .text-gray-100,
        body.light-mode .text-gray-200,
        body.light-mode .text-gray-300 {
            color: #1e293b !important;
        }

        body.light-mode .text-gray-400,
        body.light-mode .text-gray-450,
        body.light-mode .text-gray-500 {
            color: #475569 !important;
        }

        body.light-mode .text-gray-600 {
            color: #64748b !important;
        }

        body.light-mode [class*="hover:bg-slate-800"]:hover,
        body.light-mode [class*="hover:bg-slate-700"]:hover,
        body.light-mode [class*="hover:bg-slate-900"]:hover {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }

        body.light-mode [class*="hover:text-white"]:hover {
            color: #0f172a !important;
        }

        body.light-mode [class*="hover:text-gray-100"]:hover,
        body.light-mode [class*="hover:text-gray-200"]:hover,
        body.light-mode [class*="hover:text-gray-300"]:hover {
            color: #1e293b !important;
        }

        /* ── ACTIVE BUTTONS & CONTROLS GLASS ── */
        body:not(.light-mode) .sidebar-link.bg-blue-600 {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.75) 0%, rgba(37, 99, 235, 0.75) 100%) !important;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        body.light-mode .sidebar-link.bg-blue-600 {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #ffffff !important;
        }

        body.light-mode .sidebar-link.bg-blue-600 i,
        body.light-mode .sidebar-link.bg-blue-600 span {
            color: #ffffff !important;
        }

        /* Premium CTA Buttons */
        .bg-blue-600 {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .bg-blue-600:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.45) !important;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%) !important;
        }

        body.light-mode .bg-blue-600 {
            color: #ffffff !important;
        }

        /* Glassmorphic Cards Hover */
        .note-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .note-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -8px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.18) !important;
        }

        body.light-mode .note-card:hover {
            box-shadow: 0 15px 30px -8px rgba(31, 38, 135, 0.08);
            border-color: rgba(0, 0, 0, 0.15) !important;
        }

        .note-card.active-card {
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.08) !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2), inset 0 1px 0 rgba(59, 130, 246, 0.15);
        }

        body.light-mode .note-card.active-card {
            background: rgba(59, 130, 246, 0.05) !important;
        }

        /* Modals and Overlays */
        .modal {
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        body:not(.light-mode) .modal {
            background: rgba(15, 22, 38, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        body.light-mode .modal {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.8) !important;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            color: #0f172a !important;
        }

        /* toggle track & dot */
        body:not(.light-mode) #theme-toggle-dot {
            transform: translateX(0px);
        }

        body.light-mode #theme-toggle-dot {
            transform: translateX(16px);
        }

        body.light-mode #theme-toggle-track {
            background-color: #3b82f6 !important;
        }

        /* Checkbox lists */
        .checklist-item input[type="checkbox"] {
            appearance: none;
            width: 1.1rem;
            height: 1.1rem;
            border-radius: 0.25rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        body.light-mode .checklist-item input[type="checkbox"] {
            border-color: rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.03);
        }

        .checklist-item input[type="checkbox"]:checked {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .checklist-item input[type="checkbox"]:checked::before {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: white;
            font-size: 0.65rem;
        }

        .pin-dot {
            transition: all 0.2s ease;
        }

        .pin-dot.filled {
            background: #3b82f6;
            box-shadow: 0 0 8px #3b82f6;
            border-color: #3b82f6;
        }

        /* Custom scrollbar matching */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.15);
            border-radius: 99px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.35);
        }

        /* Print formatting */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }

            #sidebar,
            #notes-list-col,
            .editor-header,
            .editor-footer,
            .formatting-toolbar,
            .checklist-creator {
                display: none !important;
            }

            .editor-body {
                padding: 0 !important;
            }

            #note-title {
                border-bottom: 2px solid black !important;
                color: black !important;
            }

            #note-content {
                color: black !important;
            }
        }
    </style>
</head>

<body class="tail-container bg-slate-950 text-gray-100 min-h-screen relative overflow-hidden">
    <!-- Animated background glowing blobs -->
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>


    <!-- MAIN APP STRUCTURE -->
    <div class="flex h-screen overflow-hidden relative z-10">
        <!-- SIDEBAR DRAWER OVERLAY (Mobile only) -->
        <div id="sidebar-overlay" onclick="toggleSidebar()"
            class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-30 md:hidden transition-all duration-300"></div>

        <!-- SIDEBAR Navigation Menu -->
        <div id="sidebar"
            class="fixed inset-y-0 left-0 z-40 w-72 bg-slate-900 border-r border-slate-800 flex flex-col justify-between shrink-0 transform -translate-x-full md:translate-x-0 md:static transition-transform duration-300 ease-in-out">

            <div class="flex flex-col flex-1 overflow-y-auto">
                <!-- Branding Header -->
                <div class="p-6 border-b border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-x-3">
                        <div
                            class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/35">
                            <i class="fa-solid fa-sticky-note text-white text-2xl animate-pulse"></i>
                        </div>
                        <div>
                            <h1 class="logo-font text-3xl font-semibold tracking-tighter text-white">Notes</h1>
                            <p class="text-xs text-gray-400 tracking-widest">PERSONAL OS</p>
                        </div>
                    </div>
                    <!-- Close button on mobile -->
                    <button onclick="toggleSidebar()"
                        class="md:hidden text-gray-400 hover:text-white p-1 cursor-pointer">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <!-- Navigation List -->
                <div class="p-6 flex-1 space-y-6">
                    <!-- Standard redirects -->
                    <div class="space-y-1.5">
                        <a href="/"
                            class="flex items-center gap-x-3.5 px-4 py-3 rounded-2xl cursor-pointer text-gray-400 hover:bg-slate-800/40 hover:text-white transition-all font-medium text-sm">
                            <i class="fa-solid fa-gauge text-base text-gray-400"></i>
                            <span>Dashboard</span>
                        </a>
                    </div>

                    <!-- Note folders list (Dynamic Filters) -->
                    <div class="pt-4 border-t border-slate-800/60">
                        <div class="flex items-center justify-between mb-4 px-2">
                            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Folders</h2>
                            <button onclick="openCategoryManagerModal()"
                                class="text-xs text-gray-450 hover:text-white transition-all cursor-pointer flex items-center gap-1 font-semibold"
                                title="Manage folders / categories">
                                <i class="fa-solid fa-gear"></i>
                            </button>
                        </div>

                        <div class="space-y-1" id="folders-nav">
                            <button onclick="switchFolder('all')" id="folder-all"
                                class="w-full flex items-center justify-between px-4 py-2.5 rounded-xl cursor-pointer text-gray-400 hover:bg-slate-800/30 hover:text-white transition-all font-medium text-xs text-left">
                                <div class="flex items-center gap-x-2.5">
                                    <i class="fa-solid fa-folder-open text-gray-400"></i>
                                    <span>All Notes</span>
                                </div>
                                <span
                                    class="bg-slate-800/80 px-2 py-0.5 rounded text-[10px] text-blue-400 border border-slate-700/40"
                                    id="badge-all">0</span>
                            </button>
                            <button onclick="switchFolder('pinned')" id="folder-pinned"
                                class="w-full flex items-center justify-between px-4 py-2.5 rounded-xl cursor-pointer text-gray-400 hover:bg-slate-800/30 hover:text-white transition-all font-medium text-xs text-left">
                                <div class="flex items-center gap-x-2.5">
                                    <i class="fa-solid fa-thumbtack text-gray-400"></i>
                                    <span>Pinned</span>
                                </div>
                                <span
                                    class="bg-slate-800/80 px-2 py-0.5 rounded text-[10px] text-amber-400 border border-slate-700/40"
                                    id="badge-pinned">0</span>
                            </button>
                            <div id="dynamic-folders-container" class="space-y-1"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- MAIN EDITOR VIEWPORT CONTAINER -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- HEADER BAR -->
            <header
                class="bg-slate-900 border-b border-slate-800 px-4 md:px-8 py-5 flex items-center justify-between gap-x-4 shrink-0">
                <div class="flex items-center gap-x-3 shrink-0">
                    <!-- Hamburger button (Mobile) -->
                    <button onclick="toggleSidebar()"
                        class="md:hidden text-gray-400 hover:text-white p-2 cursor-pointer focus:outline-none">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight logo-font">Notes Workspace</h2>
                    <span
                        class="hidden sm:inline-block px-3 py-1 text-[10px] font-bold bg-emerald-500/10 text-emerald-400 rounded-2xl border border-emerald-500/20 uppercase tracking-wider">Sync
                        Active</span>
                </div>

                <!-- Center Search Box -->
                <div class="flex-1 max-w-md hidden md:block">
                    <div class="relative">
                        <input id="search-input" onkeyup="filterNotes()" type="text"
                            placeholder="Search note content, folders, tags..."
                            class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 rounded-3xl py-2.5 px-5 pl-12 text-sm outline-none transition-all">
                        <div class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fa-solid fa-magnifying-glass text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- New Note primary triggers -->
                <div class="flex items-center gap-x-3 shrink-0">
                    <!-- Visual Theme Switcher (Header) -->
                    <button onclick="toggleTheme()" id="theme-toggle-header"
                        class="w-10 h-10 border border-slate-800 bg-slate-900/40 hover:bg-slate-800 rounded-2xl cursor-pointer flex items-center justify-center text-gray-400 hover:text-white transition-all"
                        title="Toggle Dark/Light Mode">
                        <i class="fa-solid fa-moon text-lg text-amber-400" id="theme-icon"></i>
                    </button>

                    <button onclick="createNewNote()"
                        class="flex items-center gap-x-2 bg-blue-600 hover:bg-blue-700 transition-colors text-white px-4 md:px-6 py-2.5 md:py-3 rounded-3xl font-medium text-xs md:text-sm shadow-lg shadow-blue-500/30">
                        <i class="fa-solid fa-plus text-sm"></i>
                        <span class="hidden sm:inline">New Reflection</span>
                        <span class="sm:hidden">New Note</span>

    <!-- Injected data from Django views -->

    <script>
        // Global variables and state managers
        let notes = [];
        let activeNoteId = null;
        let currentFolder = 'all';
        let searchQuery = '';
        let autosaveTimeout = null;
        let isDarkMode = true;

        // Categories management system configurations
        const colorClasses = {
            blue: { badge: 'bg-blue-500/10 text-blue-400 border-blue-500/20', active: 'bg-blue-600', dot: 'bg-blue-500' },
            yellow: { badge: 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20', active: 'bg-yellow-600', dot: 'bg-yellow-500' },
            pink: { badge: 'bg-pink-500/10 text-pink-400 border-pink-500/20', active: 'bg-pink-600', dot: 'bg-pink-500' },
            emerald: { badge: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20', active: 'bg-emerald-600', dot: 'bg-emerald-500' },
            purple: { badge: 'bg-purple-500/10 text-purple-400 border-purple-500/20', active: 'bg-purple-600', dot: 'bg-purple-500' },
            indigo: { badge: 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20', active: 'bg-indigo-600', dot: 'bg-indigo-500' },
            cyan: { badge: 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20', active: 'bg-cyan-600', dot: 'bg-cyan-500' },
            orange: { badge: 'bg-orange-500/10 text-orange-400 border-orange-500/20', active: 'bg-orange-600', dot: 'bg-orange-500' },
            red: { badge: 'bg-red-500/10 text-red-400 border-red-500/20', active: 'bg-red-600', dot: 'bg-red-500' }
        };

        const defaultCategories = [
            { id: 'work', name: 'Work Project', color: 'blue' },
            { id: 'idea', name: 'Creative Idea', color: 'yellow' },
            { id: 'personal', name: 'Personal Log', color: 'pink' },
            { id: 'study', name: 'Study Notes', color: 'emerald' }
        ];

        let categories = JSON.parse(localStorage.getItem('notes_categories')) || defaultCategories;
        let selectedCategoryColorVal = 'blue';

        // Theme management handlers (Header-focused visual theme visual synchronization)
        function applyTheme(dark) {
            const body = document.body;
            const icon = document.getElementById('theme-icon');

            if (dark) {
                body.classList.remove('light-mode');
                if (icon) { icon.className = 'fa-solid fa-moon text-lg text-amber-400'; }
            } else {
                body.classList.add('light-mode');
                if (icon) { icon.className = 'fa-solid fa-sun text-lg text-amber-400'; }
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            applyTheme(isDarkMode);
            localStorage.setItem('expenseFlowTheme', isDarkMode ? 'dark' : 'light');
        }

        function loadTheme() {
            const saved = localStorage.getItem('expenseFlowTheme');
            isDarkMode = saved !== 'light';
            applyTheme(isDarkMode);
        }

        // Dynamic Folder/Category CRUD Modal controllers
        function openCategoryManagerModal() {
            document.getElementById('category-modal').classList.remove('hidden');
            resetCategoryForm();
            renderCategoryManagerList();
        }

        function closeCategoryManagerModal() {
            document.getElementById('category-modal').classList.add('hidden');
        }

        function selectCategoryColor(color) {
            selectedCategoryColorVal = color;
            document.querySelectorAll('#category-color-selector button').forEach(btn => {
                btn.classList.remove('border-white', 'scale-110');
                if (btn.getAttribute('data-color') === color) {
                    btn.classList.add('border-white', 'scale-110');
                }
            });
        }

        function resetCategoryForm() {
            document.getElementById('category-name-input').value = '';
            document.getElementById('edit-category-id').value = '';
            document.getElementById('category-form-title').innerText = 'Create New Folder';
            document.getElementById('btn-cancel-cat-edit').classList.add('hidden');
            selectCategoryColor('blue');
        }

        function saveCategoryForm() {
            const nameInput = document.getElementById('category-name-input').value.trim();
            const editId = document.getElementById('edit-category-id').value;

            if (!nameInput) {
                alert("Please enter a folder name.");
                return;
            }

            if (editId) {
                // Edit mode
                const idx = categories.findIndex(c => c.id === editId);
                if (idx !== -1) {
                    categories[idx].name = nameInput;
                    categories[idx].color = selectedCategoryColorVal;
                }
            } else {
                // Add mode
                const newId = 'cat_' + Date.now();
                categories.push({
                    id: newId,
                    name: nameInput,
                    color: selectedCategoryColorVal
                });
            }

            localStorage.setItem('notes_categories', JSON.stringify(categories));

            renderDynamicFolders();
            renderCategorySelector();
            renderNotesFeed();

            if (activeNoteId) {
                loadNoteDetails(activeNoteId);
            }

            resetCategoryForm();
            renderCategoryManagerList();
        }

        function editCategory(id) {
            const cat = categories.find(c => c.id === id);
            if (!cat) return;

            document.getElementById('category-name-input').value = cat.name;
            document.getElementById('edit-category-id').value = cat.id;
            document.getElementById('category-form-title').innerText = 'Edit Folder: ' + cat.name;
            document.getElementById('btn-cancel-cat-edit').classList.remove('hidden');
            selectCategoryColor(cat.color);
        }

        function deleteCategory(id) {
            if (confirm("Delete this folder permanently? Notes in this folder will become Uncategorized.")) {
                categories = categories.filter(c => c.id !== id);
                localStorage.setItem('notes_categories', JSON.stringify(categories));

                // Shift matching notes to empty category
                notes.forEach(n => {
                    if (n.category === id) {
                        n.category = '';
                        n.updatedAt = Date.now();
                    }
                });

                syncNotesToDatabase();

                if (currentFolder === id) {
                    switchFolder('all');
                } else {
                    renderDynamicFolders();
                    renderCategorySelector();
                    renderNotesFeed();
                    if (activeNoteId) {
                        loadNoteDetails(activeNoteId);
                    }
                }

                renderCategoryManagerList();
            }
        }

        function renderCategoryManagerList() {
            const container = document.getElementById('category-manager-list');
            container.innerHTML = '';

            categories.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-2.5 bg-slate-800/40 border border-slate-800 rounded-xl';
                const dotColor = colorClasses[cat.color]?.dot || 'bg-blue-500';

                item.innerHTML = `
                    <div class="flex items-center gap-x-2.5">
                        <span class="w-3 h-3 rounded-full ${dotColor}"></span>
                        <span class="text-xs font-semibold text-white">${escapeHTML(cat.name)}</span>
                    </div>
                    <div class="flex items-center gap-x-1 shrink-0">
                        <button onclick="editCategory('${cat.id}')" class="text-gray-400 hover:text-white p-1 cursor-pointer" title="Rename/Edit">
                            <i class="fa-solid fa-pen text-[10px]"></i>
                        </button>
                        <button onclick="deleteCategory('${cat.id}')" class="text-gray-500 hover:text-red-400 p-1 cursor-pointer" title="Delete folder">
                            <i class="fa-solid fa-trash text-[10px]"></i>
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderDynamicFolders() {
            const container = document.getElementById('dynamic-folders-container');
            if (!container) return;
            container.innerHTML = '';

            categories.forEach(cat => {
                const count = notes.filter(n => n.category === cat.id).length;
                const dotColor = colorClasses[cat.color]?.dot || 'bg-blue-500';

                const btn = document.createElement('button');
                btn.id = `folder-${cat.id}`;
                btn.onclick = () => switchFolder(cat.id);
                btn.className = `w-full flex items-center justify-between px-4 py-2.5 rounded-xl cursor-pointer text-gray-400 hover:bg-slate-800/30 hover:text-white transition-all font-medium text-xs text-left`;
                if (currentFolder === cat.id) {
                    btn.classList.add('bg-slate-800/40', 'text-white');
                    btn.classList.remove('text-gray-400');
                }

                btn.innerHTML = `
                    <div class="flex items-center gap-x-2.5">
                        <span class="w-2.5 h-2.5 rounded-full ${dotColor}"></span>
                        <span>${escapeHTML(cat.name)}</span>
                    </div>
                    <span class="bg-slate-800/80 px-2 py-0.5 rounded text-[10px] text-gray-400 border border-slate-700/40" id="badge-${cat.id}">${count}</span>
                `;
                container.appendChild(btn);
            });
        }

        function renderCategorySelector() {
            const container = document.getElementById('category-selector');
            if (!container) return;
            container.innerHTML = '';

            categories.forEach(cat => {
                const dotColor = colorClasses[cat.color]?.dot || 'bg-blue-500';
                const btn = document.createElement('button');
                btn.id = `cat-${cat.id}`;
                btn.onclick = () => setCategory(cat.id);
                btn.className = `px-3.5 py-1.5 bg-slate-800/40 hover:bg-slate-700/60 transition-all border border-slate-800 rounded-xl text-xs font-semibold text-gray-400 hover:text-white cursor-pointer flex items-center gap-x-2`;
                btn.innerHTML = `
                    <span class="w-2 h-2 rounded-full ${dotColor}"></span>
                    <span>${escapeHTML(cat.name)}</span>
                `;
                container.appendChild(btn);
            });
        }

        // Core dynamic operations for Notes view
        function loadData() {
            const dataElem = document.getElementById('notes-data');
            if (dataElem) {
                try {
                    notes = JSON.parse(dataElem.textContent);
                } catch (e) {
                    notes = [];
                    console.error("Notes data hydration failed", e);
                }
            }
        }

        function renderAll() {
            renderNotesFeed();
            if (notes.length > 0) {
                selectNote(notes[0].id);
            } else {
                createNewNote();
            }
        }

        // Render feeds list
        function renderNotesFeed() {
            const container = document.getElementById('notes-list-container');
            container.innerHTML = '';

            let filtered = notes;

            // Filter folders
            if (currentFolder === 'pinned') {
                filtered = notes.filter(n => n.pinned);
            } else if (currentFolder !== 'all') {
                filtered = notes.filter(n => n.category === currentFolder);
            }

            // Search queries
            if (searchQuery) {
                filtered = filtered.filter(n => n.title.toLowerCase().includes(searchQuery) || n.content.toLowerCase().includes(searchQuery));
            }

            // Order sorting: pinned first, then updated chronologically reverse
            filtered.sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return b.updatedAt - a.updatedAt;
            });

            filtered.forEach(note => {
                const isActive = note.id === activeNoteId;
                const card = document.createElement('div');
                card.className = `note-card bg-slate-900/50 border border-slate-800 rounded-3xl p-5 hover:border-slate-700 cursor-pointer transition-all duration-300 relative flex flex-col gap-y-2 select-none ${isActive ? 'active-card' : ''}`;

                let badges = '';
                if (note.pinned) {
                    badges += `<span class="text-amber-400 text-xs" title="Pinned Note"><i class="fa-solid fa-thumbtack"></i></span>`;
                }

                let tagBadge = '';
                if (note.category) {
                    const catData = categories.find(c => c.id === note.category);
                    const colorClass = (catData && colorClasses[catData.color]?.badge) || 'bg-blue-500/10 text-blue-400 border-blue-500/20';
                    const catNameText = catData ? catData.name : note.category;

                    tagBadge = `<span class="px-2 py-0.5 text-[9px] font-bold ${colorClass} border rounded-full capitalize">${escapeHTML(catNameText)}</span>`;
                }

                let contentSnippet = escapeHTML(note.content || "Empty content reflection");

                const d = new Date(note.updatedAt);
                const dateText = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

                card.innerHTML = `
                    <div class="flex justify-between items-start gap-x-2">
                        <h4 class="text-sm font-semibold text-gray-100 line-clamp-1 flex-1">${escapeHTML(note.title) || "Untitled Reflection"}</h4>
                        <div class="flex items-center gap-x-1.5 shrink-0">${badges}</div>
                    </div>
                    <p class="text-xs text-gray-400 leading-relaxed line-clamp-2">${contentSnippet}</p>
                    <div class="flex items-center justify-between mt-1 text-[10px] text-gray-500 font-semibold">
                        <span>${dateText}</span>
                        ${tagBadge}
                    </div>
                `;

                card.addEventListener('click', () => {
                    selectNote(note.id);
                });

                container.appendChild(card);
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 text-xs text-gray-500 leading-relaxed border border-dashed border-slate-800 rounded-3xl p-5 bg-slate-900/10">
                        No reflections or folders found matching query.
                    </div>
                `;
            }

            updateSidebarCounters();
        }

        // Switch folders
        function switchFolder(folderId) {
            currentFolder = folderId;
            document.querySelectorAll('#folders-nav button').forEach(btn => {
                btn.classList.remove('bg-slate-800/40', 'text-white');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById(`folder-${folderId}`);
            if (activeBtn) {
                activeBtn.classList.add('bg-slate-800/40', 'text-white');
                activeBtn.classList.remove('text-gray-400');
            }
            renderNotesFeed();
        }

        // Sidebar counts
        function updateSidebarCounters() {
            document.getElementById('badge-all').innerText = notes.length;
            document.getElementById('badge-pinned').innerText = notes.filter(n => n.pinned).length;
            renderDynamicFolders();
        }

        // Selection notes view
        function selectNote(id) {
            saveActiveNote(true);

            const note = notes.find(n => n.id === id);
            if (!note) return;

            loadNoteDetails(id);
        }

        function loadNoteDetails(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            if (!note) return;

            document.getElementById('note-title').value = note.title || '';
            document.getElementById('note-content').value = note.content || '';

            document.getElementById('active-note-header').innerText = note.title || "Untitled Reflection Note";

            const dateObj = new Date(note.updatedAt);
            document.getElementById('active-note-date').innerText = `Last saved ${dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} at ${dateObj.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })}`;

            // Category selector setup
            document.querySelectorAll('#category-selector button').forEach(btn => {
                Object.values(colorClasses).forEach(cfg => btn.classList.remove(cfg.active, 'text-white', 'border-transparent'));
                btn.classList.add('bg-slate-800/40', 'text-gray-400', 'border-slate-800');
            });
            if (note.category) {
                const btn = document.getElementById(`cat-${note.category}`);
                if (btn) {
                    const catData = categories.find(c => c.id === note.category);
                    const activeColorClass = (catData && colorClasses[catData.color]?.active) || 'bg-blue-600';

                    btn.classList.add(activeColorClass, 'text-white', 'border-transparent');
                    btn.classList.remove('bg-slate-800/40', 'text-gray-400', 'border-slate-800');
                }
            }

            // Controls buttons toggles
            const btnPin = document.getElementById('btn-pin');
            if (note.pinned) {
                btnPin.classList.add('bg-blue-600', 'text-white');
                btnPin.classList.remove('bg-slate-900/40', 'text-gray-400');
            } else {
                btnPin.classList.remove('bg-blue-600', 'text-white');
                btnPin.classList.add('bg-slate-900/40', 'text-gray-400');
            }

            renderChecklist(note.checklist);
            updateWordCounters();
            document.getElementById('autosave-indicator').classList.add('opacity-0');

            // Clean up old active classes in notes list and set new
            document.querySelectorAll('#notes-list-container > div').forEach(el => el.classList.remove('active-card'));
            renderNotesFeed();
        }

        // Save active workspace log
        function saveActiveNote(isAutosave = false) {
            if (!activeNoteId) return;

            const titleInput = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value;

            // Get Category
            let category = '';
            const activeCat = document.querySelector('#category-selector button.text-white');
            if (activeCat) {
                category = activeCat.id.replace('cat-', '');
            }

            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx === -1) return;

            // Avoid saving empty drafts
            if (isAutosave && !titleInput && !content && !category && notes[idx].checklist.length === 0) return;

            const prev = notes[idx];
            const checklist = getChecklistFromDOM();

            notes[idx] = {
                ...prev,
                title: titleInput || "Untitled Reflection Log",
                content: content,
                category: category,
                checklist: checklist,
                updatedAt: Date.now()
            };

            // Trigger Database sync background API
            syncNotesToDatabase();

            if (isAutosave) {
                const indicator = document.getElementById('autosave-indicator');
                indicator.classList.remove('opacity-0');
                setTimeout(() => {
                    indicator.classList.add('opacity-0');
                }, 1500);
            }
        }

        // Sync to backend SQLite API
        let syncTimeout = null;
        function syncNotesToDatabase() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                const csrftoken = getCookie('csrftoken');
                fetch('/api/save_notes/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify(notes)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status !== 'success') {
                            console.error("Database note synchronization failed:", data.message);
                        }
                    })
                    .catch(err => console.error("AJAX database notes post failed:", err));
            }, 600);
        }

        function handleSaveButton() {
            saveActiveNote(false);
            renderNotesFeed();
            alert("Reflection note synchronized to Django database successfully.");
        }

        // Create new note
        function createNewNote() {
            saveActiveNote(true);

            const newNote = {
                id: Date.now(),
                title: "",
                content: "",
                category: "",
                pinned: false,
                locked: false,
                checklist: [],
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            notes.unshift(newNote);
            renderNotesFeed();
            selectNote(newNote.id);
            document.getElementById('note-title').focus();
        }

        // Delete active
        function handleDeleteNote() {
            if (!activeNoteId) return;

            if (confirm("Delete this reflection log permanently? This will remove it from the database.")) {
                notes = notes.filter(n => n.id !== activeNoteId);
                syncNotesToDatabase();
                renderNotesFeed();

                if (notes.length > 0) {
                    selectNote(notes[0].id);
                } else {
                    createNewNote();
                }
            }
        }

        // Pin toggles
        function handleTogglePin() {
            if (!activeNoteId) return;

            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx === -1) return;

            notes[idx].pinned = !notes[idx].pinned;
            notes[idx].updatedAt = Date.now();

            saveActiveNote(true);
            loadNoteDetails(activeNoteId);
        }

        // Categories set
        function setCategory(catName) {
            const btn = document.getElementById(`cat-${catName}`);
            if (!btn) return;
            const isSelected = btn.classList.contains('text-white');

            document.querySelectorAll('#category-selector button').forEach(b => {
                Object.values(colorClasses).forEach(cfg => b.classList.remove(cfg.active, 'text-white', 'border-transparent'));
                b.classList.add('bg-slate-800/40', 'text-gray-400', 'border-slate-800');
            });

            if (!isSelected) {
                const catData = categories.find(c => c.id === catName);
                const activeColorClass = (catData && colorClasses[catData.color]?.active) || 'bg-blue-600';

                btn.classList.add(activeColorClass, 'text-white', 'border-transparent');
                btn.classList.remove('bg-slate-800/40', 'text-gray-400', 'border-slate-800');
            }

            triggerAutosave();
        }

        // Debounce autosave triggers
        function triggerAutosave() {
            if (autosaveTimeout) clearTimeout(autosaveTimeout);
            autosaveTimeout = setTimeout(() => {
                saveActiveNote(true);
            }, 1000);
        }

        function handleContentInput() {
            triggerAutosave();
            updateWordCounters();
        }

        // Nested Checklist controllers
        function renderChecklist(arr) {
            const container = document.getElementById('checklist-list');
            container.innerHTML = '';

            if (!arr || arr.length === 0) return;

            arr.forEach((item, idx) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'flex items-center justify-between p-2 rounded-xl hover:bg-slate-800/20 border border-transparent hover:border-slate-800/60 checklist-item';

                itemEl.innerHTML = `
                    <div class="flex items-center gap-x-3 flex-1">
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleChecklistItem(${idx})" class="cursor-pointer">
                        <span contenteditable="true" onblur="editChecklistItem(${idx}, this)" class="text-xs text-gray-200 outline-none flex-1 font-medium ${item.done ? 'line-through text-gray-500 opacity-60' : ''}">${escapeHTML(item.text)}</span>
                    </div>
                    <button onclick="removeChecklistItem(${idx})" class="text-gray-500 hover:text-red-400 transition-colors p-1" title="Remove action">
                        <i class="fa-solid fa-xmark text-xs"></i>
                    </button>
                `;

                container.appendChild(itemEl);
            });
        }

        function handleAddChecklistItem() {
            const input = document.getElementById('checklist-item-input');
            const val = input.value.trim();
            if (!val || !activeNoteId) return;

            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx === -1) return;

            notes[idx].checklist.push({ text: val, done: false });
            notes[idx].updatedAt = Date.now();
            input.value = '';

            saveActiveNote(true);
            renderChecklist(notes[idx].checklist);
        }

        function toggleChecklistItem(index) {
            if (!activeNoteId) return;
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx === -1) return;

            notes[idx].checklist[index].done = !notes[idx].checklist[index].done;
            notes[idx].updatedAt = Date.now();

            saveActiveNote(true);
            renderChecklist(notes[idx].checklist);
        }

        function editChecklistItem(index, textElem) {
            if (!activeNoteId) return;
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx === -1) return;

            const text = textElem.innerText.trim();
            if (text) {
                notes[idx].checklist[index].text = text;
                notes[idx].updatedAt = Date.now();
                saveActiveNote(true);
            }
        }

        function removeChecklistItem(index) {
            if (!activeNoteId) return;
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx === -1) return;

            notes[idx].checklist.splice(index, 1);
            notes[idx].updatedAt = Date.now();

            saveActiveNote(true);
            renderChecklist(notes[idx].checklist);
        }

        function getChecklistFromDOM() {
            const list = [];
            document.querySelectorAll('#checklist-list > div').forEach(itemEl => {
                const checked = itemEl.querySelector('input[type="checkbox"]').checked;
                const text = itemEl.querySelector('span[contenteditable]').innerText.trim();
                if (text) {
                    list.push({ text: text, done: checked });
                }
            });
            return list;
        }

        // Rich format injects
        function insertFormat(type) {
            const textarea = document.getElementById('note-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;

            let ws = "";
            let we = "";

            if (type === 'bold') { ws = "**"; we = "**"; }
            else if (type === 'italic') { ws = "*"; we = "*"; }
            else if (type === 'bullet') { ws = "\n- "; we = ""; }
            else if (type === 'code') { ws = "`"; we = "`"; }

            const formatted = ws + text.substring(start, end) + we;
            textarea.value = text.substring(0, start) + formatted + text.substring(end);

            textarea.focus();
            textarea.selectionStart = start + ws.length;
            textarea.selectionEnd = end + ws.length;

            triggerAutosave();
            updateWordCounters();
        }

        // Copy to clipboard
        function handleCopyContent() {
            const textarea = document.getElementById('note-content');
            if (!textarea.value) return;

            navigator.clipboard.writeText(textarea.value).then(() => {
                alert("Note content copied to clipboard.");
            }, () => {
                alert("Copy failed.");
            });
        }

        // Stats word/char counters
        function updateWordCounters() {
            const text = document.getElementById('note-content').value;
            const characters = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;

            document.getElementById('word-counter').innerText = `${words} word${words !== 1 ? 's' : ''} / ${characters} character${characters !== 1 ? 's' : ''}`;
        }

        // Export currently selected note in MS Word (.doc) format
        function downloadNoteAsDoc() {
            if (!activeNoteId) {
                alert("Please select a note to export.");
                return;
            }
            const note = notes.find(n => n.id === activeNoteId);
            if (!note) return;

            const title = note.title || "Untitled Reflection";
            const content = note.content || "";
            const catData = categories.find(c => c.id === note.category);
            const catName = catData ? catData.name : "Uncategorized";
            const formattedDate = new Date(note.updatedAt).toLocaleString();

            const htmlString = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                      xmlns:w='urn:schemas-microsoft-com:office:word' 
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset="utf-8">
                    <title>${escapeHTML(title)}</title>
                    <style>
                        body {
                            font-family: 'Segoe UI', Arial, sans-serif;
                            color: #1e293b;
                            line-height: 1.6;
                            margin: 40px;
                        }
                        h1 {
                            font-family: 'Century Gothic', sans-serif;
                            font-size: 26px;
                            color: #1e3a8a;
                            border-bottom: 2px solid #3b82f6;
                            padding-bottom: 8px;
                            margin-bottom: 4px;
                        }
                        .meta-info {
                            font-size: 11px;
                            color: #64748b;
                            margin-bottom: 30px;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                        }
                        .note-body {
                            font-size: 14px;
                            white-space: pre-wrap;
                            background: #f8fafc;
                            border-left: 4px solid #cbd5e1;
                            padding: 15px;
                        }
                    </style>
                </head>
                <body>
                    <h1>${escapeHTML(title)}</h1>
                    <div class="meta-info">Folder: ${escapeHTML(catName)} | Last Updated: ${formattedDate}</div>
                    <div class="note-body">${escapeHTML(content)}</div>
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff' + htmlString], { type: 'application/msword;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            const sanitizedTitle = title.replace(/[^a-zA-Z0-9]/g, "_") || "note";
            anchor.setAttribute("href", url);
            anchor.setAttribute("download", `${sanitizedTitle}.doc`);
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(url);
        }

        // Backups export / imports
        function exportBackupJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes, null, 2));
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStr);
            anchor.setAttribute("download", `ZenNotes_OS_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
        }

        function importBackupJSON(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    if (parsed && Array.isArray(parsed)) {
                        if (confirm("Merge and sync imported notes with your current SQLite database?")) {
                            notes = [...notes, ...parsed];
                            syncNotesToDatabase();
                            renderNotesFeed();
                            if (notes.length > 0) selectNote(notes[0].id);
                            alert("Notes database synchronized and merged successfully.");
                        }
                    } else {
                        alert("Backup database format invalid.");
                    }
                } catch (err) {
                    alert("Failed to parse backup database file.");
                }
            };
            reader.readAsText(file);
        }

        // Search logic filters
        function filterNotes() {
            const input = document.getElementById('search-input');
            searchQuery = input.value.trim().toLowerCase();
            renderNotesFeed();
        }

        function filterNotesMobile() {
            const mobileInput = document.getElementById('search-input-mobile');
            const desktopInput = document.getElementById('search-input');
            if (mobileInput && desktopInput) {
                desktopInput.value = mobileInput.value;
                filterNotes();
            }
        }

        // CSRF Token fetch helper
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Mobile side menu toggle drawer
        function toggleSidebar() {
            const drawer = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (drawer && overlay) {
                const isHidden = drawer.classList.contains('-translate-x-full');
                if (isHidden) {
                    drawer.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    drawer.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        }

        // Keyboard shortcuts support
        function registerKeybinds() {
            document.addEventListener('keydown', function (e) {
                if (e.key === "Escape") {
                    document.getElementById('category-modal').classList.add('hidden');
                }
                if (e.key === "n" && e.ctrlKey) {
                    e.preventDefault();
                    createNewNote();
                }
                if (e.key === "s" && e.ctrlKey) {
                    e.preventDefault();
                    handleSaveButton();
                }
            });
        }

        // Boot and startup
        function initializeApp() {
            loadTheme();
            loadData();

            // Hook backup files change
            document.getElementById('backup-file-loader').addEventListener('change', importBackupJSON);

            // Close category modal on overlay clicks
            const categoryModal = document.getElementById('category-modal');
            if (categoryModal) {
                categoryModal.addEventListener('click', function (e) {
                    if (e.target === categoryModal) {
                        closeCategoryManagerModal();
                    }
                });
            }

            registerKeybinds();
            renderCategorySelector();
            renderAll();

            console.log('%cZenNotes initialized successfully in Liquid Glass design', 'color: #3b82f6; font-weight: 600');
        }

        window.onload = initializeApp;
    </script>
</body>

</html>
